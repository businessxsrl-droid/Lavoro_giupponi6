<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Calor Systems V2</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@600;700&display=swap"
        rel="stylesheet">
    <link rel="icon" type="image/png" href="/static/favicon.png?v=2">
    <link rel="stylesheet" href="/static/style.css?v=2">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: var(--bg-primary);
        }

        .login-card {
            background: var(--bg-secondary);
            padding: 40px;
            border-radius: var(--radius);
            box-shadow: var(--shadow-card);
            width: 100%;
            max-width: 400px;
            border: 1px solid var(--bg-tertiary);
            text-align: center;
        }

        .login-logo {
            max-width: 200px;
            margin-bottom: 16px;
        }

        .login-form input {
            width: 100%;
            padding: 12px;
            margin-bottom: 16px;
            border: 1px solid var(--bg-tertiary);
            border-radius: var(--radius-sm);
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            box-sizing: border-box;
        }

        .pw-wrapper {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 16px;
        }

        .pw-wrapper input {
            margin-bottom: 0;
            flex: 1;
        }

        .pw-toggle {
            flex-shrink: 0;
            background: var(--bg-primary);
            border: 1px solid var(--bg-tertiary);
            border-radius: var(--radius-sm);
            cursor: pointer;
            color: var(--text-muted);
            padding: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 42px;
            height: 42px;
            transition: color 0.2s, border-color 0.2s;
        }

        .pw-toggle:hover {
            color: var(--text-primary);
            border-color: var(--accent-blue);
        }

        .login-form button {
            width: 100%;
            padding: 12px;
            background: var(--accent-blue);
            color: white;
            border: none;
            border-radius: var(--radius-sm);
            font-weight: 700;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .login-form button:hover {
            box-shadow: 0 4px 12px rgba(1, 28, 255, 0.2);
            transform: translateY(-2px);
        }

        .error-msg {
            color: var(--accent-red);
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
        }
    </style>
</head>

<body>
    <div class="login-card">
        <img src="/static/logo.png" alt="Calor Systems Logo" class="login-logo">
        <p style="color: var(--text-secondary); margin-bottom: 24px; font-size: 14px;">Motore Riconciliazione - Accesso
            Riservato</p>
        <div id="error-msg" class="error-msg"></div>
        <form class="login-form" id="login-form">
            <input type="text" id="username" placeholder="Nome Utente" required autocomplete="username">
            <div class="pw-wrapper">
                <input type="password" id="password" placeholder="Password" required autocomplete="current-password">
                <button type="button" class="pw-toggle" id="togglePw" onclick="togglePw()" title="Mostra/Nascondi password">
                    <svg id="togglePwIcon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 7.5C7.695 7.5 4.476 11.083 3.395 12.465a.6.6 0 0 0 0 1.07C4.476 14.917 7.695 18.5 12 18.5s7.524-3.583 8.605-4.965a.6.6 0 0 0 0-1.07C19.524 11.083 16.305 7.5 12 7.5Z"/>
                        <circle cx="12" cy="13" r="2"/>
                    </svg>
                </button>
            </div>
            <button type="submit" id="login-btn">Accedi in Sicurezza</button>
        </form>
    </div>

    <script src="/static/_auth.js?v=2"></script>
    <script>
        function togglePw() {
            const input = document.getElementById('password');
            const icon  = document.getElementById('togglePwIcon');
            if (input.type === 'password') {
                input.type = 'text';
                // occhio barrato
                icon.innerHTML = '<path d="M12 7.5C7.695 7.5 4.476 11.083 3.395 12.465a.6.6 0 0 0 0 1.07C4.476 14.917 7.695 18.5 12 18.5s7.524-3.583 8.605-4.965a.6.6 0 0 0 0-1.07C19.524 11.083 16.305 7.5 12 7.5Z"/><circle cx="12" cy="13" r="2"/><line x1="4" y1="4" x2="20" y2="20"/>';
            } else {
                input.type = 'password';
                // occhio aperto
                icon.innerHTML = '<path d="M12 7.5C7.695 7.5 4.476 11.083 3.395 12.465a.6.6 0 0 0 0 1.07C4.476 14.917 7.695 18.5 12 18.5s7.524-3.583 8.605-4.965a.6.6 0 0 0 0-1.07C19.524 11.083 16.305 7.5 12 7.5Z"/><circle cx="12" cy="13" r="2"/>';
            }
        }

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const errorMsg = document.getElementById('error-msg');
            const btn = document.getElementById('login-btn');

            errorMsg.style.display = 'none';
            btn.disabled = true;
            btn.textContent = 'Verifica in corso...';

            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: user, password: pass })
                });

                const data = await res.json();

                if (res.ok) {
                    // Login corretto, _auth.js ha le funzioni per salvare il token
                    Auth.setTokens(data.access_token, data.refresh_token);
                    window.location.href = '/';
                } else {
                    errorMsg.textContent = data.msg || 'Errore di autenticazione';
                    errorMsg.style.display = 'block';
                }
            } catch (e) {
                errorMsg.textContent = 'Errore di rete';
                errorMsg.style.display = 'block';
            } finally {
                btn.disabled = false;
                btn.textContent = 'Accedi in Sicurezza';
            }
        });
    </script>
</body>

</html>
