version: '3.8'

services:
  # Database PostgreSQL
  db:
    image: postgres:15
    container_name: lavoro_giupponi_db
    environment:
      POSTGRES_DB: lavoro_giupponi6
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Applicazione Flask
  app:
    build: .
    container_name: lavoro_giupponi_app
    environment:
      # URL interno per connettersi al container 'db'
      DATABASE_URL: postgresql://user:password@db:5432/lavoro_giupponi6
      JWT_SECRET: ${JWT_SECRET:-supersecret}
      # Aggiungi qui altre variabili d'ambiente necessarie
    ports:
      - "5000:5000"
    depends_on:
      - db
    # Monta la directory corrente per hot-reload durante lo sviluppo
    volumes:
      - .:/app

volumes:
  postgres_data:
