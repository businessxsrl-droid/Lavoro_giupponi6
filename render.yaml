services:
  - type: web
    name: riconciliatore-giupponi
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 600 --workers 2
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SUPABASE_URL
        value: https://gwznscloavgcfkbxmzec.supabase.co
      - key: SUPABASE_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true
