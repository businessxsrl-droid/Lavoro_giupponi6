databases:
  - name: riconciliatore-db
    databaseName: riconciliatore
    user: riconciliatore_user
    plan: free

services:
  - type: web
    name: riconciliatore-giupponi
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 600
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        fromDatabase:
          name: riconciliatore-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
